<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: #f5f1ea; color: #3d3a34; min-height: 100vh; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; }
  h1 { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; color: #5c6b53; }
  .date { font-size: 13px; color: #8a8578; margin-top: 2px; margin-bottom: 20px; }

  .streak-row { display: flex; gap: 10px; margin-bottom: 24px; }
  .stat-card { flex: 1; background: #fffdfa; border: 1px solid #e5e0d5; border-radius: 14px; padding: 14px; text-align: center; }
  .stat-num { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; color: #5c6b53; }
  .stat-label { font-size: 11px; color: #8a8578; margin-top: 2px; }

  .week-strip { display: flex; gap: 6px; margin-bottom: 28px; }
  .day-dot { flex: 1; text-align: center; }
  .day-letter { font-size: 11px; color: #8a8578; margin-bottom: 4px; }
  .day-circle { width: 28px; height: 28px; border-radius: 50%; background: #eef0e8; border: 2px solid #e5e0d5; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .day-circle.done { background: #5c6b53; border-color: #5c6b53; color: white; }
  .day-circle.today { border-color: #5c6b53; border-width: 2.5px; }

  .section-title { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; margin-top: 26px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #c9c3b4; }
  .section-sub { font-size: 12.5px; color: #8a8578; margin-bottom: 10px; margin-top: -6px; }

  .ex-card { background: #fffdfa; border: 1px solid #e5e0d5; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
  .ex-card.checked { background: #eef0e8; }
  .ex-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #c9c3b4; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; transition: all 0.15s; }
  .ex-check.on { background: #5c6b53; border-color: #5c6b53; }
  .ex-text { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 500; color: #3d3a34; }
  .ex-name.checked { text-decoration: line-through; color: #a39d8f; }
  .ex-detail { font-size: 12px; color: #8a8578; margin-top: 1px; }

  .goal-box { background: #f2e9dd; border-radius: 14px; padding: 18px; margin-top: 28px; }
  .goal-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; color: #6b5d4a; margin-bottom: 8px; }
  .goal-bar-bg { background: #e5d9c6; border-radius: 20px; height: 14px; overflow: hidden; margin: 10px 0; }
  .goal-bar-fill { background: #5c6b53; height: 100%; border-radius: 20px; transition: width 0.4s ease; }
  .goal-text { font-size: 12.5px; color: #6b5d4a; }

  .rest-msg { background: #eef0e8; border-radius: 14px; padding: 18px; text-align: center; color: #5c6b53; font-size: 14px; margin-top: 10px; }

  .encourage { text-align: center; font-size: 13px; color: #8a8578; margin-top: 20px; font-style: italic; }

  .reset-btn { display: block; margin: 30px auto 0; background: none; border: 1px solid #c9c3b4; color: #8a8578; font-size: 12px; padding: 8px 16px; border-radius: 20px; }
</style>
</head>
<body>
<div class="wrap" id="app">Loading...</div>

<script>
const EXERCISES = {
  arm: {
    label: "💪 Arm Day",
    items: [
      { id: "curls", name: "Bicep Curls", detail: "3 sets × 12-15" },
      { id: "overhead_tri", name: "Overhead Tricep Extension", detail: "3 sets × 12-15" },
      { id: "kickbacks", name: "Tricep Kickbacks", detail: "3 sets × 12-15" },
      { id: "lateral", name: "Lateral Raises", detail: "2 sets × 12-15" },
      { id: "incline_pu", name: "Incline Push-Ups", detail: "2-3 sets × 10-12" },
      { id: "dips", name: "Tricep Dips", detail: "2-3 sets × 10-12" }
    ]
  },
  leg: {
    label: "🦵 Leg Band Day",
    items: [
      { id: "leg_ext", name: "Seated Band Leg Extensions", detail: "2-3 sets × 12-15" },
      { id: "abduct", name: "Seated Band Abductions", detail: "2-3 sets × 15" },
      { id: "adduct", name: "Seated Band Adductions", detail: "2-3 sets × 15" },
      { id: "march", name: "Seated Marching with Band", detail: "20-30 total" }
    ]
  }
};

const BONUS = [
  { id: "crunch", name: "Crunches", detail: "Core · 2-3 sets × 12-15" },
  { id: "twist", name: "Seated Core Twists", detail: "Core · 2 sets × 15-20" },
  { id: "deadbug", name: "Modified Dead Bug", detail: "Core · 2 sets × 10" },
  { id: "band_curl", name: "Band Bicep Curls", detail: "Bonus arms · 2-3 sets × 12-15" },
  { id: "band_row", name: "Band Rows", detail: "Bonus arms · 2-3 sets × 12-15" },
  { id: "band_chest", name: "Band Chest Press", detail: "Bonus arms · 2-3 sets × 12-15" },
  { id: "pullapart", name: "Band Pull-Aparts", detail: "Bonus arms · 2-3 sets × 15" },
  { id: "bridge", name: "Glute Bridge", detail: "Glutes · 2-3 sets × 12-15" },
  { id: "clamshell", name: "Clamshells", detail: "Glutes · 2 sets × 15/side" },
  { id: "glute_kick", name: "Standing Band Glute Kickback", detail: "Glutes · 2 sets × 12-15" }
];

const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAY_LETTERS = ["S","M","T","W","T","F","S"];

function todayKey(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}

function getDayType(dayOfWeek) {
  if ([1,3,5].includes(dayOfWeek)) return 'arm';
  if ([2,4].includes(dayOfWeek)) return 'leg';
  return 'rest';
}

let state = { days: {}, goalStart: null };

function loadState() {
  try {
    const raw = localStorage.getItem('workout-state');
    if (raw) state = JSON.parse(raw);
  } catch (e) { /* no data yet */ }
  if (!state.goalStart) {
    state.goalStart = todayKey(0);
    saveState();
  }
  render();
}

function saveState() {
  try {
    localStorage.setItem('workout-state', JSON.stringify(state));
  } catch (e) { console.error('save failed', e); }
}

function getDayData(key) {
  if (!state.days[key]) state.days[key] = { main: {}, bonus: {} };
  return state.days[key];
}

function isMainDone(key, dayType) {
  if (dayType === 'rest') return false;
  const data = getDayData(key);
  const list = EXERCISES[dayType].items;
  return list.every(item => data.main[item.id]);
}

function calcStreak() {
  let streak = 0;
  for (let i = 0; i >= -60; i--) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const key = d.toISOString().slice(0,10);
    const dow = d.getDay();
    const dayType = getDayType(dow);
    if (dayType === 'rest') continue;
    if (isMainDone(key, dayType)) { streak++; }
    else { break; }
  }
  return streak;
}

function calcGoalProgress() {
  if (!state.goalStart) return 0;
  const start = new Date(state.goalStart);
  const now = new Date();
  const daysElapsed = Math.floor((now - start) / 86400000);
  const pct = Math.min(100, Math.round((daysElapsed / 28) * 100));
  return { pct, daysElapsed: Math.max(0, daysElapsed) };
}

function toggleMain(key, id) {
  const data = getDayData(key);
  data.main[id] = !data.main[id];
  saveState();
  render();
}

function toggleBonus(key, id) {
  const data = getDayData(key);
  data.bonus[id] = !data.bonus[id];
  saveState();
  render();
}

function render() {
  const today = new Date();
  const key = todayKey(0);
  const dow = today.getDay();
  const dayType = getDayType(dow);
  const data = getDayData(key);
  const streak = calcStreak();
  const goal = calcGoalProgress();

  let weekStrip = '';
  for (let i = -3; i <= 3; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const dKey = d.toISOString().slice(0,10);
    const dt = getDayType(d.getDay());
    const done = dt !== 'rest' && isMainDone(dKey, dt);
    const isToday = i === 0;
    weekStrip += `<div class="day-dot">
      <div class="day-letter">${DAY_LETTERS[d.getDay()]}</div>
      <div class="day-circle ${done ? 'done' : ''} ${isToday ? 'today' : ''}">${done ? '✓' : d.getDate()}</div>
    </div>`;
  }

  let mainSection = '';
  if (dayType === 'rest') {
    mainSection = `<div class="rest-msg">🛌 Rest day — recovery is part of the plan. Bonus work below is optional.</div>`;
  } else {
    const ex = EXERCISES[dayType];
    mainSection = `<div class="section-title">${ex.label}</div>` +
      ex.items.map(item => {
        const checked = !!data.main[item.id];
        return `<div class="ex-card ${checked ? 'checked' : ''}" onclick="toggleMain('${key}','${item.id}')">
          <div class="ex-check ${checked ? 'on' : ''}">${checked ? '✓' : ''}</div>
          <div class="ex-text">
            <div class="ex-name ${checked ? 'checked' : ''}">${item.name}</div>
            <div class="ex-detail">${item.detail}</div>
          </div>
        </div>`;
      }).join('');
  }

  const bonusSection = `<div class="section-title">✨ Bonus (optional)</div>
    <div class="section-sub">Core, extra bands, glutes — do a few if you have energy</div>` +
    BONUS.map(item => {
      const checked = !!data.bonus[item.id];
      return `<div class="ex-card ${checked ? 'checked' : ''}" onclick="toggleBonus('${key}','${item.id}')">
        <div class="ex-check ${checked ? 'on' : ''}">${checked ? '✓' : ''}</div>
        <div class="ex-text">
          <div class="ex-name ${checked ? 'checked' : ''}">${item.name}</div>
          <div class="ex-detail">${item.detail}</div>
        </div>
      </div>`;
    }).join('');

  const encouragements = [
    "Showing up counts, even on the harder days.",
    "Consistency beats intensity — you're building the habit.",
    "Every rep is progress your future self will thank you for.",
    "You don't have to be perfect, just consistent.",
    "This is recovery-friendly strength — be proud of it."
  ];
  const msg = encouragements[new Date().getDate() % encouragements.length];

  document.getElementById('app').innerHTML = `
    <h1>Workout Tracker</h1>
    <div class="date">${DAY_NAMES[dow]}, ${today.toLocaleDateString('en-US', {month:'long', day:'numeric'})}</div>

    <div class="streak-row">
      <div class="stat-card"><div class="stat-num">${streak}</div><div class="stat-label">Day streak 🔥</div></div>
      <div class="stat-card"><div class="stat-num">${goal.daysElapsed}</div><div class="stat-label">of 28 days</div></div>
    </div>

    <div class="week-strip">${weekStrip}</div>

    ${mainSection}
    ${bonusSection}

    <div class="goal-box">
      <div class="goal-title">4-Week Goal</div>
      <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${goal.pct}%"></div></div>
      <div class="goal-text">${goal.pct}% through your 4-week window · started ${state.goalStart}</div>
    </div>

    <div class="encourage">${msg}</div>

    <button class="reset-btn" onclick="resetGoal()">Restart 4-week goal from today</button>
  `;
}

async function resetGoal() {
  state.goalStart = todayKey(0);
  await saveState();
  render();
}

window.toggleMain = toggleMain;
window.toggleBonus = toggleBonus;
window.resetGoal = resetGoal;

loadState();

</script>
</body>
</html>
